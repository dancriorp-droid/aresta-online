name: 🤖 Scraper Diário - Aresta Online

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      data_inicio:
        description: 'Data início (YYYY-MM-DD) - opcional'
        required: false
        default: ''
      data_fim:
        description: 'Data fim (YYYY-MM-DD) - opcional'
        required: false
        default: ''
      hotel_id:
        description: 'Hotel específico - opcional (padrão: todos)'
        required: false
        default: ''
      modo:
        description: 'Modo de busca: vazio=dia a dia | periodo=entrada/saída completo'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  alto_da_boa_vista:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Roda se: nenhum hotel foi especificado OU este hotel foi especificado
    if: ${{ github.event.inputs.hotel_id == '' || github.event.inputs.hotel_id == 'alto_da_boa_vista' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: cd scraper && pip install -r requirements.txt && playwright install --with-deps chromium
      - run: cd scraper && python scraper.py "${{ github.event.inputs.data_inicio }}" "${{ github.event.inputs.data_fim }}" alto_da_boa_vista "${{ github.event.inputs.modo }}"
      - name: 💾 Push
        run: |
          git config user.name "Aresta Bot"
          git config user.email "aresta-bot@noreply.github.com"
          git add -f dados/alto_da_boa_vista/
          git diff --staged --quiet && echo "Sem mudanças" || (
            git stash &&
            git pull --rebase origin main &&
            git stash pop &&
            git add -f dados/alto_da_boa_vista/ &&
            git commit -m "🤖 alto_da_boa_vista $(date -u +'%Y-%m-%d %H:%M')" &&
            git push
          )

  hamburgo:
